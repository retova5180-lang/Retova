<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retova</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="index.css">

</head>

<body>

<div class="container">

<div class="logo">

Retova

</div>

<div class="slogan">

Share. Create. Connect.

</div>

<div class="tabs">

<button class="tab active" id="signupTab">

Create Account

</button>

<button class="tab" id="loginTab">

Log In

</button>

</div>
<div id="signupForm">

<input
class="input"
type="text"
placeholder="Username"
id="username"
>

<input
class="input"
type="text"
placeholder="Display Name"
id="displayName"
>

<input
class="input"
type="number"
placeholder="Age"
id="age"
min="13"
max="100"
>

<select
class="input"
id="gender"
>

<option value="">
Gender
</option>

<option>
Female
</option>

<option>
Male
</option>

</select>

<input
class="input"
type="email"
placeholder="Email"
id="email"
>

<input
class="input"
type="password"
placeholder="Password"
id="password"
>

<button class="mainBtn">

Create Account

</button>

<div class="divider">

Or continue with

</div>

<button class="googleBtn">

Continue with Google

</button>

<div class="terms">

By creating an account you agree to our
<a href="#">Terms & Conditions</a>

</div>

</div>


<div id="loginForm" style="display:none;">

<input
class="input"
type="email"
placeholder="Email"
id="loginEmail"
>

<input
class="input"
type="password"
placeholder="Password"
id="loginPassword"
>

<button class="mainBtn">

Log In

</button>

<div class="divider">

Or continue with

</div>

<button class="googleBtn">

Continue with Google

</button>

<div class="terms">

Don't have an account?
<a href="#">Create Account</a>

</div>

</div>

</div>

<script src="index.js"></script>

</body>

</html>
