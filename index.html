<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retova | Welcome</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="background-glow"></div>

<div class="login-card">

<!-- Logo -->

<div class="logo">

<h1>Retova</h1>

<p>Share. Create. Connect.</p>

</div>

<!-- Tabs -->

<div class="tabs">

<button
class="tab-btn active"
id="loginTab">

Login

</button>

<button
class="tab-btn"
id="signupTab">

Create Account

</button>

</div>

<!-- ===========================
LOGIN FORM
=========================== -->

<form id="loginForm">

<div class="input-box">

<label for="loginEmail">

Email

</label>

<input
type="email"
id="loginEmail"
placeholder="Enter your email"
required>

</div>

<div class="input-box">

<label for="loginPassword">

Password

</label>

<input
type="password"
id="loginPassword"
placeholder="Enter your password"
required>

</div>

<div class="remember">

<label>

<input type="checkbox">

Remember me

</label>

<a href="#">

Forgot Password?

</a>

</div>

<button
type="submit"
class="login-btn">

Login

</button>

</form>

<!-- ===========================
CREATE ACCOUNT
=========================== -->

<form
id="signupForm"
style="display:none;">
  <!-- Avatar -->

<div class="avatar-section">

<label for="avatarUpload" class="avatar-label">

<img
id="avatarPreview"
src="assets/images/avatar.png"
alt="Avatar">

<div class="avatar-plus">

+

</div>

</label>

<input
type="file"
id="avatarUpload"
accept="image/*"
hidden>

</div>

<!-- Display Name -->

<div class="input-box">

<label for="displayName">

Display Name

</label>

<input
type="text"
id="displayName"
placeholder="Enter your display name"
maxlength="30"
required>

</div>

<!-- Username -->

<div class="input-box">

<label for="username">

Username

</label>

<input
type="text"
id="username"
placeholder="@username"
maxlength="20"
autocomplete="off"
required>

</div>

<!-- Email -->

<div class="input-box">

<label for="signupEmail">

Email

</label>

<input
type="email"
id="signupEmail"
placeholder="Enter your email"
autocomplete="email"
required>

</div>
<!-- Password -->

<div class="input-box">

<label for="signupPassword">

Password

</label>

<input
type="password"
id="signupPassword"
placeholder="Create your password"
autocomplete="new-password"
required>

</div>

<!-- Confirm Password -->

<div class="input-box">

<label for="confirmPassword">

Confirm Password

</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm your password"
autocomplete="new-password"
required>

</div>

<!-- Date of Birth -->

<div class="input-box">

<label for="birthDate">

Date of Birth

</label>

<input
type="date"
id="birthDate"
required>

</div>

<button
type="submit"
class="login-btn">

Create Account

</button>

</form>
<!-- Divider -->

<div class="divider">

<span>or</span>

</div>

<!-- Google -->

<button
type="button"
class="google-btn"
id="googleLogin">

Continue with Google

</button>

<!-- Bottom -->

<div class="bottom">

<p id="bottomText">

Don't have an account?

<a href="#"
id="switchForm">

Create Account

</a>

</p>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

<script>
const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);
</script>

<script src="auth.js"></script>
<script src="auth.js"></script>

</body>

</html>
