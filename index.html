<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retova</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="index.css">

</head>

<body>

<div class="container">

<div class="logo">
Retova
</div>

<p class="slogan">
Share. Create. Connect.
</p>

<div class="tabs">

<button
class="tab active"
id="signupTab">

Create Account

</button>

<button
class="tab"
id="loginTab">

Log In

</button>

</div>

<!-- Create Account -->

<div
class="form"
id="signupForm">

<input
class="input"
type="text"
placeholder="Username">

<input
class="input"
type="text"
placeholder="Display Name">

<input
class="input"
type="number"
placeholder="Age">

<select class="input">

<option>
Gender
</option>

<option>
Female
</option>

<option>
Male
</option>

</select>

<input
class="input"
type="email"
placeholder="Email">

<input
class="input"
type="password"
placeholder="Password">

<button class="mainBtn">

Create Account

</button>

<div class="divider">

<span>OR</span>

</div>

<button class="googleBtn">

Continue with Google

</button>

<p class="terms">

By continuing you agree to our

<a href="#">

Terms & Conditions

</a>

</p>

</div>

<!-- Login -->

<div
class="form"
id="loginForm"
style="display:none;">

<input
class="input"
type="email"
placeholder="Email">

<input
class="input"
type="password"
placeholder="Password">

<button class="mainBtn">

Log In

</button>

<div class="divider">

<span>OR</span>

</div>

<button class="googleBtn">

Continue with Google

</button>

<p class="terms">

Don't have an account?

<a href="#">

Create Account

</a>

</p>

</div>

</div>

<script src="index.js"></script>

</body>

</html>
