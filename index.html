<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Retova</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="index.css">
</head>

<body>

<div class="container">

    <h1 class="logo">Retova</h1>

    <p class="slogan">
        Share. Create. Connect.
    </p>

    <form id="signupForm">

        <div class="avatar">

            <img id="avatarPreview"
            src="https://ui-avatars.com/api/?name=R&background=7C5CFC&color=ffffff&size=200">

            <input
            type="file"
            id="avatarInput"
            accept="image/*">

        </div>

        <input
        type="text"
        placeholder="Name"
        required>

        <input
        type="text"
        placeholder="Username"
        required>

        <input
        type="number"
        placeholder="Age"
        min="9"
        max="100"
        required>

        <input
        type="email"
        placeholder="Email"
        required>

        <input
        type="password"
        placeholder="Password"
        required>

        <button type="submit">

            Create Account

        </button>

        <button
        type="button"
        class="google">

            Continue with Google

        </button>

    </form>

    <div class="login">

        Already have an account?

        <a href="login.html">

            Log In

        </a>

    </div>

</div>

<script src="index.js"></script>

</body>

</html>
