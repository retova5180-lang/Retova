<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Retova - Create Account</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="index.css">

</head>

<body>

<div class="container">

    <div class="logo">
        Retova
    </div>

    <p class="slogan">
        Share. Create. Connect.
    </p>

    <form id="signupForm">

        <div class="avatar">

            <img
            id="avatarPreview"
            src="https://ui-avatars.com/api/?name=R&background=7C5CFC&color=ffffff&size=200"
            alt="Avatar">

            <input
            type="file"
            id="avatarInput"
            accept="image/*">

        </div>

        <input
        type="text"
        id="name"
        placeholder="Name"
        required>

        <input
        type="text"
        id="username"
        placeholder="Username"
        required>

        <input
        type="number"
        id="age"
        placeholder="Age"
        min="9"
        max="100"
        required>

        <input
        type="email"
        id="email"
        placeholder="Email"
        required>

        <div class="passwordBox">

            <input
            type="password"
            id="password"
            placeholder="Password"
            required>

            <span id="togglePassword">
                👁
            </span>

        </div>

        <button type="submit">

            Create Account

        </button>

        <button
        type="button"
        class="google">

            Continue with Google

        </button>

        <div class="terms">

            By creating an account you agree to our

            <a href="#">Terms of Service</a>

            and

            <a href="#">Privacy Policy</a>

        </div>

    </form>

    <div class="login">

        Already have an account?

        <a href="login.html">

            Log In

        </a>

    </div>

</div>

<script src="index.js"></script>

</body>

</html>
